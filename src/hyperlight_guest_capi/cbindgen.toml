language = "C"

includes = ["stdint.h", "stdbool.h", "macro.h"]
no_includes = true
after_includes = """
#define LOG(level, message) hl_log(level, message, __LINE__, __FILE__)
#define _alloca _alloca_wrapper

/* libc-compatible file I/O aliases */
#define SEEK_SET hl_HL_SEEK_SET
#define SEEK_CUR hl_HL_SEEK_CUR
#define SEEK_END hl_HL_SEEK_END
#define O_RDONLY hl_HL_O_RDONLY
#define O_WRONLY hl_HL_O_WRONLY
#define O_RDWR   hl_HL_O_RDWR
#define O_CREAT  hl_HL_O_CREAT
#define O_TRUNC  hl_HL_O_TRUNC
#define O_APPEND hl_HL_O_APPEND

/* fcntl commands */
#define F_DUPFD  hl_HL_F_DUPFD
#define F_GETFD  hl_HL_F_GETFD
#define F_SETFD  hl_HL_F_SETFD
#define F_GETFL  hl_HL_F_GETFL
#define F_SETFL  hl_HL_F_SETFL

/* access() mode flags */
#define R_OK     hl_HL_R_OK
#define W_OK     hl_HL_W_OK
#define X_OK     hl_HL_X_OK
#define F_OK     hl_HL_F_OK

/* Directory entry types */
#define DT_UNKNOWN hl_HL_DT_UNKNOWN
#define DT_DIR     hl_HL_DT_DIR
#define DT_REG     hl_HL_DT_REG

/* AT_* constants */
#define AT_FDCWD hl_HL_AT_FDCWD

/* Unprefixed libc-style names */
#define open(path, flags)       hl_fs_open(path, flags)
#define close(fd)               hl_fs_close(fd)
#define read(fd, buf, n)        hl_fs_read(fd, buf, n)
#define write(fd, buf, n)       hl_fs_write(fd, buf, n)
#define lseek(fd, off, w)       hl_fs_lseek(fd, off, w)
#define fstat(fd, st)           hl_fs_fstat(fd, st)
#define stat(path, st)          hl_fs_stat(path, st)
#define mkdir(path, mode)       hl_fs_mkdir(path)  /* mode ignored - FAT has no permissions */
#define rmdir(path)             hl_fs_rmdir(path)
#define unlink(path)            hl_fs_unlink(path)
#define rename(old, new)        hl_fs_rename(old, new)
#define getcwd(buf, size)       hl_fs_getcwd(buf, size)
#define chdir(path)             hl_fs_chdir(path)
#define openat(fd, path, flags) hl_fs_openat(fd, path, flags)
#define mkdirat(fd, path, mode) hl_fs_mkdirat(fd, path)  /* mode ignored - FAT has no permissions */
#define fcntl(fd, cmd, arg)     hl_fs_fcntl(fd, cmd, arg)
#define dup(fd)                 hl_fs_dup(fd)
#define dup2(old, new)          hl_fs_dup2(old, new)
#define access(path, mode)      hl_fs_access(path, mode)
#define opendir(path)           hl_fs_opendir(path)
#define readdir(dirp)           hl_fs_readdir_entry(dirp)
#define closedir(dirp)          hl_fs_closedir(dirp)
"""
documentation = false
style = "type"
include_guard = "HYPERLIGHT_GUEST_H"
header = "/* This file is automatically generated by cbindgen from hyperlight_guest_capi/build.rs.\n   Do not modify.*/"

[parse]
parse_deps = true
include = ["hyperlight-guest-bin", "log", "hyperlight-common"]
extra_bindings = ["hyperlight-guest-bin"]

[enum]
prefix_with_name = true

[export]
prefix = "hl_"

[export.rename]
"FfiFunctionCall" = "FunctionCall"
"FfiParameter" = "Parameter"
"FfiParameterValue" = "ParameterValue"
"FfiVec" = "Vec"

